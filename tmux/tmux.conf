# true color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# mouse
set -g mouse on

# no escape delay
set -s escape-time 10

# start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# more history
set -g history-limit 50000

# splits open in current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vim keys in copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# reload config
bind r source-file ~/.tmux.conf \; display "reloaded"

# status bar
set -g status-position bottom
set -g status-style 'bg=colour235 fg=colour250'
set -g status-left '#[fg=colour39,bold] #S  '
set -g status-left-length 20
set -g status-right '#[fg=colour250] %H:%M  %d %b '
set -g status-right-length 30
set -g window-status-current-format '#[fg=colour255,bold] #I #W '
set -g window-status-format '#[fg=colour244] #I #W '
set -g window-status-separator ''
